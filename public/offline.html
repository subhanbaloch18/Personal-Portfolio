<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Subhan Ghafoor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a192f;
      color: #ccd6f6;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 440px;
      background: rgba(17,34,64,0.8);
      border: 1px solid rgba(100,255,218,0.15);
      border-radius: 16px;
      padding: 2.5rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1.2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.6rem; }
    p { color: #8892b0; font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.8rem; }
    button {
      background: transparent;
      border: 1px solid #64ffda;
      color: #64ffda;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace, system-ui;
      transition: all 0.25s;
    }
    button:hover {
      background: #64ffda;
      color: #0a192f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Some content may still be available from the cache.
    </p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
